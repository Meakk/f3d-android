name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - master

jobs:

  #----------------------------------------------------------------------------
  # Cache LFS: Checkout LFS data and update the cache to limit LFS bandwidth
  #----------------------------------------------------------------------------
  cache_lfs:
    runs-on: ubuntu-22.04
    name: Update LFS data cache
    outputs:
      lfs_sha: ${{ steps.lfs_sha_recover.outputs.lfs_sha }}
    steps:
      - name: Cache LFS Data
        id: lfs_sha_recover
        uses: f3d-app/lfs-data-cache-action@v2

  #----------------------------------------------------------------------------
  # Build and upload .apk packages
  #----------------------------------------------------------------------------
  build:
    needs: [cache_lfs]

    name: Build and Test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [small_phone, medium_phone, medium_tablet, desktop_large]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "source"
          fetch-depth: 0
          lfs: false

      - name: Recover LFS Data
        uses: f3d-app/lfs-data-cache-action@v2
        with:
            type: "consumer"
            lfs_sha: ${{ needs.cache_lfs.outputs.lfs_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        working-directory: ${{github.workspace}}/source
        run: ./gradlew assembleDebug --no-configuration-cache

      # https://github.blog/changelog/2023-02-23-hardware-accelerated-android-virtualization-on-actions-windows-and-linux-larger-hosted-runners/
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Using lavapipe (Mesa) is very important, the default GPU backend is broken
      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          arch: x86_64
          profile: ${{ matrix.profile }}
          emulator-options: -no-window -gpu lavapipe -no-snapshot -noaudio -no-boot-anim
          script: ./gradlew connectedAndroidTest --info
          working-directory: ${{github.workspace}}/source

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.profile }}
          path: ./source/f3d/build/outputs/connected_android_test_additional_output/debugAndroidTest/connected/
